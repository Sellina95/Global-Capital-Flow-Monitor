name: Daily Macro Report

on:
  workflow_dispatch:
  schedule:
    - cron: "0 22 * * *" # UTC 22:00 = KST 07:00

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Install dependencies (including scikit-learn)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt  # scikit-learn 추가된 requirements.txt로 설치

      - name: Ensure required directories exist
        run: |
          mkdir -p reports
          mkdir -p data

      # 🔥 (ONE-TIME) Rebuild full macro history (Geo EW bootstrap)
      - name: Rebuild full macro history (90d bootstrap)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          export PYTHONPATH="$GITHUB_WORKSPACE"
          python scripts/rebuild_macro_history.py

      # ✅ 1) Macro 데이터 먼저 업데이트 (매일)
      - name: Fetch macro data (US10Y/DXY/WTI/VIX/USDKRW)
        run: |
          export PYTHONPATH="$GITHUB_WORKSPACE"
          python scripts/fetch_macro_data.py

      # ✅ 2) Liquidity 데이터 업데이트 (매일)
      - name: Fetch liquidity data (TGA/RRP)
        run: |
          export PYTHONPATH="$GITHUB_WORKSPACE"
          python scripts/fetch_liquidity_data.py

      # ✅ 하이일드 스프레드(HY OAS) 데이터 업데이트
      - name: Fetch credit spread data (HY OAS)
        run: |
          export PYTHONPATH="$GITHUB_WORKSPACE"
          python scripts/fetch_credit_spread_data.py

      # ✅ FRED 금융여건/실질금리 데이터 업데이트
      - name: Fetch FRED macro extras (FCI / Real Rates)
        run: |
          export PYTHONPATH="$GITHUB_WORKSPACE"
          python scripts/fetch_fred_macro_extras.py
            # ✅ Country ETF combined data (Geo EW / Country Risk)

      - name: Fetch country ETF combined data
        run: |
          export PYTHONPATH="$GITHUB_WORKSPACE"
          python scripts/fetch_country_etf_data_combined.py

      # ✅ Sovereign yields (FRED 기반)
      - name: Fetch Sovereign Yields (CDS proxy)
        run: |
          export PYTHONPATH="$GITHUB_WORKSPACE"
          python scripts/fetch_sovereign_yields.py

      # ✅ Sovereign spreads (Stooq 기반)
      - name: Fetch Sovereign Spreads (Stooq)
        run: |
          export PYTHONPATH="$GITHUB_WORKSPACE"
          python scripts/fetch_sovereign_spreads.py --days 400
             
      - name: Download and process FRED data
        run: |
          export PYTHONPATH="$GITHUB_WORKSPACE"
          python scripts/fred_data_fetcher.py

      # ✅ macro_data.csv schema 정리 (ragged 방지)
      - name: Repair macro_data.csv schema (prevent ragged CSV)
        run: |
          export PYTHONPATH="$GITHUB_WORKSPACE"
          python scripts/repair_macro_csv.py

      - name: Debug macro_data header
        run: |
          head -n 1 data/macro_data.csv || true

      # ✅ Sentiment proxy
      - name: Fetch Sentiment proxy (VIX + Credit)
        run: |
          export PYTHONPATH="$GITHUB_WORKSPACE"
          python scripts/fetch_sentiment_proxy.py

      # ✅ (중복 방지용) report 직전 한 번 더 schema repair
      - name: Repair macro_data.csv schema (before report)
        run: |
          export PYTHONPATH="$GITHUB_WORKSPACE"
          python scripts/repair_macro_csv.py

      # ✅ Backfill (수동 실행에서만)
      - name: Backfill Geo history (one-shot)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          export PYTHONPATH="$GITHUB_WORKSPACE"
          python scripts/backfill_geo_history.py --days 180
      # ✅ ETF 데이터 다운로드
      - name: Fetch ETF data
        run: |
         export PYTHONPATH="$GITHUB_WORKSPACE"
         python scripts/fetch_etf_data.py

      - name: Calculate ETF returns
        run: |
          export PYTHONPATH="$GITHUB_WORKSPACE"
          python scripts/etf_returns.py

      # ✅ 3) 리포트 생성 (이메일 발송 환경 변수 추가)
      - name: Run report generator
        env:
          # GitHub Secrets에서 가져온 값을 환경 변수로 주입
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          RESEND_TO: ${{ secrets.RESEND_TO }}
        run: |
          export PYTHONPATH="$GITHUB_WORKSPACE"
          python -u scripts/generate_report.py
          echo "=== [CHECK 1] 오늘 리포트 파일이 생성되었나? ==="
          ls -l reports/daily_report_2026-04-08.md || echo "❌ 파일이 없습니다!"
          
      # ✅ (디버그) 최신 리포트 상단 확인
      - name: Debug report head (latest)
        run: |
          echo "== reports dir listing =="
          ls -al reports || true
          echo "== latest report file =="
          latest=$(ls -t reports/*.md 2>/dev/null | head -n 1)
          echo "LATEST=$latest"
          if [ -n "$latest" ]; then
            echo "== report head (first 40 lines) =="
            head -n 40 "$latest" || true
          else
            echo "No report file found in reports/"
          fi

      # ✅ (디버그) 데이터 tail 확인
      - name: Debug latest data rows
        run: |
          echo "== macro_data tail =="
          tail -n 3 data/macro_data.csv || true
          echo "== liquidity_data tail =="
          tail -n 3 data/liquidity_data.csv || true
          echo "== sovereign_yields tail =="
          tail -n 3 data/sovereign_yields.csv || true
          echo "== sovereign_spreads tail =="
          tail -n 3 data/sovereign_spreads.csv || true

      - name: Debug macro_data date column
        run: |
          echo "== macro_data first 5 rows =="
          head -n 6 data/macro_data.csv || true

      # ✅ 4) 커밋 & 푸시
      - name: Commit and push report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add reports/*.md || true
          git add data/*.csv || true

          echo "== data files =="
          ls -al data || true

          echo "== git status (porcelain) =="
          git status --porcelain || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: auto-update data + generate report"
          git push
