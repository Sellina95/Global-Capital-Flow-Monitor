name: Daily Macro Report

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *" # UTC 01:00 = KST 10:00

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure required directories exist
        run: |
          mkdir -p reports
          mkdir -p data
          mkdir -p insights

      - name: Rebuild full macro history
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          export PYTHONPATH="$GITHUB_WORKSPACE"
          python scripts/rebuild_macro_history.py

      - name: Fetch macro data
        run: |
          export PYTHONPATH="$GITHUB_WORKSPACE"
          python scripts/fetch_macro_data.py

      - name: Debug macro_data after fetch
        run: |
          echo "== macro_data tail after fetch =="
          tail -n 5 data/macro_data.csv || true

      - name: Fetch liquidity data
        run: |
          export PYTHONPATH="$GITHUB_WORKSPACE"
          python scripts/fetch_liquidity_data.py

      - name: Fetch credit spread data
        run: |
          export PYTHONPATH="$GITHUB_WORKSPACE"
          python scripts/fetch_credit_spread_data.py

      - name: Fetch FRED macro extras
        run: |
          export PYTHONPATH="$GITHUB_WORKSPACE"
          python scripts/fetch_fred_macro_extras.py

      - name: Fetch country ETF combined data
        run: |
          export PYTHONPATH="$GITHUB_WORKSPACE"
          python scripts/fetch_country_etf_data_combined.py

      - name: Fetch Sovereign Yields
        run: |
          export PYTHONPATH="$GITHUB_WORKSPACE"
          python scripts/fetch_sovereign_yields.py

      - name: Fetch Sovereign Spreads
        run: |
          export PYTHONPATH="$GITHUB_WORKSPACE"
          python scripts/fetch_sovereign_spreads.py --days 400

      - name: Download and process FRED data
        run: |
          export PYTHONPATH="$GITHUB_WORKSPACE"
          python scripts/fred_data_fetcher.py

      - name: Repair macro_data.csv schema
        run: |
          export PYTHONPATH="$GITHUB_WORKSPACE"
          python scripts/repair_macro_csv.py

      - name: Debug macro_data after first repair
        run: |
          echo "== macro_data tail after first repair =="
          tail -n 5 data/macro_data.csv || true

      - name: Debug macro_data header
        run: |
          head -n 1 data/macro_data.csv || true

      - name: Fetch Sentiment proxy
        run: |
          export PYTHONPATH="$GITHUB_WORKSPACE"
          python scripts/fetch_sentiment_proxy.py

      - name: Repair macro_data.csv schema before report
        run: |
          export PYTHONPATH="$GITHUB_WORKSPACE"
          python scripts/repair_macro_csv.py

      - name: Debug macro_data before report
        run: |
          echo "== macro_data tail before report =="
          tail -n 5 data/macro_data.csv || true

      - name: Backfill Geo history
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          export PYTHONPATH="$GITHUB_WORKSPACE"
          python scripts/backfill_geo_history.py --days 180

      - name: Fetch ETF data
        run: |
          export PYTHONPATH="$GITHUB_WORKSPACE"
          python scripts/fetch_etf_data.py

      - name: Calculate ETF returns
        run: |
          export PYTHONPATH="$GITHUB_WORKSPACE"
          python scripts/etf_returns.py

      - name: Fetch Positioning Data
        run: |
          export PYTHONPATH="$GITHUB_WORKSPACE"
          python scripts/fetch_positioning_data.py

      - name: Run SEW Monitor
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          RESEND_TO: ${{ secrets.RESEND_TO }}
        run: |
          export PYTHONPATH="$GITHUB_WORKSPACE"
          python scripts/monitor_sew.py

      - name: Debug SEW files
        run: |
          echo "== insights dir =="
          ls -al insights || true
          echo "== sew_state.json =="
          cat insights/sew_state.json || true

      - name: Run portfolio return calc
        run: |
          export PYTHONPATH="$GITHUB_WORKSPACE"
          python portfolio/calc_portfolio_return.py
    
    
      - name: Debug macro core before report
        run: |
          echo "== macro core tail before report =="
          python - <<'PY'
          import pandas as pd

          df = pd.read_csv("data/macro_data.csv")

          cols = ["date", "US10Y", "DXY", "WTI", "VIX", "USDKRW"]

          for c in cols:
              if c not in df.columns:
                  print(f"❌ Missing column: {c}")

          print(df[cols].tail(10).to_string(index=False))
          PY

      - name: Run report generator
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          RESEND_TO: ${{ secrets.RESEND_TO }}
        run: |
          export PYTHONPATH="$GITHUB_WORKSPACE"

          echo "=== [CHECK 1] 현재 작업 디렉토리 및 파일 목록 ==="
          pwd
          ls -R scripts/

          echo "=== [CHECK 2] 설치된 패키지 목록 ==="
          pip list | grep -E "pandas|scikit-learn|openpyxl" || echo "⚠️ 필수 패키지 확인 필요"

          echo "=== [STEP 1] 리포트 생성기 실행 시작 ==="
          python -u scripts/generate_report.py 2>&1

          PY_EXIT_CODE=$?
          echo ">>> 파이썬 종료 코드: $PY_EXIT_CODE"

          if [ $PY_EXIT_CODE -ne 0 ]; then
            echo "❌ 파이썬 스크립트 실행 중 에러가 발생했습니다!"
          fi

          echo "=== [STEP 2] latest report file 상태 확인 ==="
          latest=$(ls -t reports/daily_report_*.md 2>/dev/null | head -n 1)
          echo "LATEST=$latest"

          if [ -n "$latest" ]; then
            ls -l --full-time "$latest"
          else
            echo "❌ 리포트 파일이 생성되지 않았습니다."
          fi

      - name: Debug report head
        run: |
          echo "== reports dir listing =="
          ls -al reports || true

          echo "== latest report file =="
          latest=$(ls -t reports/*.md 2>/dev/null | head -n 1)
          echo "LATEST=$latest"

          if [ -n "$latest" ]; then
            echo "== report head (first 40 lines) =="
            head -n 40 "$latest" || true
          else
            echo "No report file found in reports/"
          fi

      - name: Debug latest data rows
        run: |
          echo "== macro_data tail =="
          tail -n 5 data/macro_data.csv || true

          echo "== liquidity_data tail =="
          tail -n 3 data/liquidity_data.csv || true

          echo "== sovereign_yields tail =="
          tail -n 3 data/sovereign_yields.csv || true

          echo "== sovereign_spreads tail =="
          tail -n 3 data/sovereign_spreads.csv || true

      - name: Debug macro_data date column
        run: |
          echo "== macro_data first 5 rows =="
          head -n 6 data/macro_data.csv || true

      - name: Commit and push report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add reports/*.md || true
          git add data/*.csv || true
          git add data/market_data_history.csv || true
          git add insights/*.json || true
          git add insights/*.log || true

          echo "== data files =="
          ls -al data || true

          echo "== git status (porcelain) =="
          git status --porcelain || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: auto-update daily report and war room data [skip ci]"
          git push