name: 24/7 Strategic Early Warning

on:
  schedule:
    # 깃허브가 10분마다 자동으로 이 파일을 실행해줍니다.
    - cron: '*/10 * * * *' 
  workflow_dispatch: # 필요할 때 수동으로도 돌릴 수 있게 버튼 생성

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install yfinance requests
      - name: Run SEW Monitor
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          RESEND_TO: ${{ secrets.RESEND_TO }}
        run: python scripts/monitor_sew.py --once
