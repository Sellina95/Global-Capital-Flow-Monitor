name: 24/7 Strategic Early Warning

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install yfinance requests

      - name: Check Resend env presence
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          RESEND_TO: ${{ secrets.RESEND_TO }}
        run: |
          python - <<'PY'
          import os
          print("HAS_RESEND_API_KEY =", bool(os.getenv("RESEND_API_KEY")))
          print("HAS_RESEND_FROM =", bool(os.getenv("RESEND_FROM")))
          print("HAS_RESEND_TO =", bool(os.getenv("RESEND_TO")))
          PY

      - name: Run SEW Monitor
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          RESEND_TO: ${{ secrets.RESEND_TO }}
        run: python scripts/monitor_sew.py --once
    
    - name: Commit HARD SEW logs only
      run: |
        if grep -Eq "SEW=DEADMAN|credit=FRACTURE|EVENT=(LIQUIDATION_SHOCK|MACRO_UNWIND|TECH_DELEVERAGING|RISK_OFF_SHOCK|MACRO_FLOW_DISLOCATION|TECH_STRESS)|spike=[2-9].*extreme=[1-9]|corr_break=YES" insights/alerts.log; then
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add insights/alerts.log insights/sew_state.json
          git commit -m "Update HARD SEW alert log" || echo "No HARD SEW log changes"
          git push
        else
          echo "No hard SEW alert. Skip commit."
        fi

    
